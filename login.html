<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Avany Móveis e Eletro</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0e0e0e; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; }

    .geo-bg {
      background-color: #0e0e0e;
      background-image:
        linear-gradient(135deg, #1a1a1a 25%, transparent 25%),
        linear-gradient(225deg, #1a1a1a 25%, transparent 25%),
        linear-gradient(315deg, #1a1a1a 25%, transparent 25%),
        linear-gradient(45deg,  #1a1a1a 25%, transparent 25%);
      background-size: 30px 30px;
      background-position: 0 0, 15px 0, 15px -15px, 0 15px;
    }

    .gold-text {
      background: linear-gradient(135deg, #c9a04c, #e8c96d, #c9a04c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .gold-gradient { background: linear-gradient(135deg, #c9a04c, #e8c96d, #b8892a); }
    .divider-gold { height: 1px; background: linear-gradient(90deg, transparent, #c9a04c55, transparent); }

    .input-field {
      width: 100%;
      background: #141414;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 14px;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .input-field:focus {
      border-color: #c9a04c;
      box-shadow: 0 0 0 3px rgba(201, 160, 76, .12);
    }
    .input-field::placeholder { color: #444; }

    .btn-gold {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #c9a04c, #e8c96d, #b8892a);
      color: #111;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      letter-spacing: .02em;
      box-shadow: 0 6px 24px rgba(201,160,76,.3);
      transition: opacity .2s, transform .15s;
    }
    .btn-gold:hover { opacity: .92; transform: translateY(-1px); }
    .btn-gold:active { transform: translateY(0); }

    .social-btn {
      width: 100%;
      padding: 12px;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      color: #ccc;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color .2s, background .2s;
    }
    .social-btn:hover { border-color: #c9a04c55; background: #1e1e1e; }

    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 32px 80px rgba(0,0,0,.7), 0 0 0 1px #c9a04c11;
      width: 100%;
      max-width: 440px;
    }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #555;
      padding: 4px;
    }
    .eye-btn:hover { color: #c9a04c; }

    a { text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body class="geo-bg">

  <!-- HEADER -->
  <header style="background: rgba(10,10,10,.9); border-bottom: 1px solid #1e1e1e; backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 50;">
    <div style="max-width: 1280px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;">
      <a href="index.html" style="display: flex; align-items: center; gap: 10px;">
        <div class="gold-gradient" style="width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(201,160,76,.3);">
          <svg width="18" height="18" fill="#111" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
        </div>
        <div>
          <p style="font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 700; letter-spacing: .15em; line-height: 1;" class="gold-text">AVANY</p>
          <p style="font-size: 9px; color: #555; letter-spacing: .12em; text-transform: uppercase; line-height: 1.2;">Móveis e Eletro</p>
        </div>
      </a>
      <div style="display: flex; align-items: center; gap: 16px;">
        <span style="font-size: 13px; color: #666;">Não tem conta?</span>
        <a href="cadastro.html" style="font-size: 13px; font-weight: 600; color: #c9a04c; border: 1px solid #c9a04c55; padding: 7px 16px; border-radius: 8px; transition: background .2s;" onmouseover="this.style.background='#c9a04c15'" onmouseout="this.style.background='transparent'">Criar conta</a>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; position: relative;">
    <!-- Glow de fundo -->
    <div style="position: absolute; inset: 0; background: radial-gradient(ellipse 50% 60% at 50% 50%, rgba(201,160,76,.07), transparent); pointer-events: none;"></div>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%; position: relative;">

      <!-- Logo grande -->
      <div style="text-align: center; margin-bottom: 32px;">
        <div class="gold-gradient" style="width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; box-shadow: 0 10px 40px rgba(201,160,76,.35);">
          <svg width="30" height="30" fill="#111" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
        </div>
        <p style="font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; letter-spacing: .2em;" class="gold-text">AVANY</p>
        <p style="font-size: 10px; color: #555; letter-spacing: .14em; text-transform: uppercase; margin-top: 2px;">Móveis e Eletro</p>
      </div>

      <!-- Card -->
      <div class="card">
        <h1 style="font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px;">Bem-vindo de volta</h1>
        <p style="font-size: 14px; color: #666; margin-bottom: 28px;">Entre na sua conta para continuar</p>

        <!-- Botões sociais -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px;">
          <button class="social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button class="social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>

        <!-- Divisor -->
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
          <div style="flex: 1; height: 1px; background: #222;"></div>
          <span style="font-size: 12px; color: #444;">ou entre com email</span>
          <div style="flex: 1; height: 1px; background: #222;"></div>
        </div>

        <!-- Form -->
        <form onsubmit="handleLogin(event)" style="display: flex; flex-direction: column; gap: 16px;">
          <div>
            <label style="display: block; font-size: 11px; font-weight: 600; color: #777; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px;">Email</label>
            <input type="email" class="input-field" placeholder="seu@email.com" required />
          </div>

          <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
              <label style="font-size: 11px; font-weight: 600; color: #777; text-transform: uppercase; letter-spacing: .1em;">Senha</label>
              <a href="#" style="font-size: 12px; color: #c9a04c;">Esqueci a senha</a>
            </div>
            <div style="position: relative;">
              <input type="password" id="pwd" class="input-field" placeholder="••••••••" required style="padding-right: 44px;" />
              <button type="button" class="eye-btn" onclick="togglePwd('pwd', this)">
                <svg id="eye-pwd" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <label style="display: flex; align-items: center; gap: 9px; cursor: pointer; font-size: 13px; color: #777; user-select: none;">
            <input type="checkbox" style="width: 16px; height: 16px; accent-color: #c9a04c;" />
            Lembrar de mim
          </label>

          <p id="login-err" style="display:none;font-size:12px;color:#f87171;background:#2a1010;border:1px solid #f8717133;border-radius:8px;padding:9px 12px;"></p>

          <button type="submit" class="btn-gold" style="margin-top: 4px;">
            Entrar na conta
          </button>
        </form>

        <!-- Rodapé do card -->
        <p style="text-align: center; font-size: 13px; color: #555; margin-top: 22px;">
          Não tem conta?
          <a href="cadastro.html" style="color: #c9a04c; font-weight: 600;">Criar conta grátis →</a>
        </p>
      </div>

      <a href="loja.html" style="margin-top: 20px; font-size: 13px; color: #444; display: flex; align-items: center; gap: 6px;">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Continuar sem entrar
      </a>
    </div>
  </main>

  <!-- FOOTER -->
  <footer style="border-top: 1px solid #1a1a1a; padding: 16px 24px; text-align: center;">
    <p style="font-size: 11px; color: #333;">&copy; 2026 Avany Móveis e Eletro · Todos os direitos reservados</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/avany.js"></script>
  <script>
    function togglePwd(id, btn) {
      const input  = document.getElementById(id);
      const isText = input.type === 'text';
      input.type   = isText ? 'password' : 'text';
      btn.querySelector('svg').style.opacity = isText ? '1' : '.5';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const form  = e.target;
      const email = form.querySelector('input[type="email"]').value.trim();
      const pw    = form.querySelector('input[type="password"]').value;
      const btn   = form.querySelector('button[type="submit"]');
      const errEl = document.getElementById('login-err');

      if (!email) return;
      errEl.style.display = 'none';
      btn.textContent     = 'Entrando…';
      btn.style.opacity   = '.7';
      btn.disabled        = true;

      try {
        const isAdmin = await Avany.auth.login(email, pw);
        window.location.href = isAdmin ? 'admin.html' : 'loja.html';
      } catch (err) {
        const msg = err.message === 'Invalid login credentials'
          ? 'Email ou senha inválidos.'
          : err.message;
        errEl.textContent   = msg;
        errEl.style.display = 'block';
        btn.textContent     = 'Entrar na conta';
        btn.style.opacity   = '1';
        btn.disabled        = false;
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const sb = Avany.sb();
      if (sb) {
        const { data } = await sb.auth.getSession();
        if (data.session) {
          const email   = data.session.user.email;
          const isAdmin = email === 'matheeus998@gmail.com';
          if (!Avany.auth.get()) {
            const name = email.split('@')[0].replace(/[._-]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            Avany.auth.set({ name, email, isAdmin });
          }
          window.location.href = isAdmin ? 'admin.html' : 'loja.html';
          return;
        }
      }
      const user = Avany.auth.get();
      if (user) window.location.href = user.isAdmin ? 'admin.html' : 'loja.html';
    });
  </script>
</body>
</html>
